[graph]
all-features = true

[advisories]
yanked = "warn"
ignore = [
    # number_prefix is transitively pulled in by indicatif; no safe upgrade available.
    "RUSTSEC-2025-0119",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
